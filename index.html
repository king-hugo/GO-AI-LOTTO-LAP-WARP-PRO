<!DOCTYPE html>
<html lang="ko" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GO, AI Lotto Lab Warp Pro</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Michroma&family=Orbitron:wght@500;700;900&family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --sw-yellow: #FFE81F;
            --sw-blue: #69C8F2;
            --sw-red: #FF3B30;
            --bg-black: #070709;
            --card-bg: rgba(18, 18, 24, 0.75);
            --border-color: rgba(255, 255, 255, 0.08);
            --text-main: #FFFFFF;
            --text-sub: #A1A1A6;
            --glow-color: rgba(255, 232, 31, 0.25);
            --apple-green: #34C759;
        }

        [data-theme="light"] {
            --sw-yellow: #C5A02F;
            --sw-blue: #007AFF;
            --sw-red: #FF3B30;
            --bg-black: #F5F5F7;
            --card-bg: rgba(255, 255, 255, 0.82);
            --border-color: rgba(0, 0, 0, 0.06);
            --text-main: #1D1D1F;
            --text-sub: #86868B;
            --glow-color: rgba(0, 122, 255, 0.12);
            --apple-green: #248A3D;
        }

        body {
            margin: 0;
            font-family: 'Noto Sans KR', sans-serif;
            color: var(--text-main);
            background-color: var(--bg-black);
            display: flex;
            justify-content: center;
            min-height: 100dvh;
            overflow-x: hidden;
            transition: background-color 0.4s ease;
            -webkit-tap-highlight-color: transparent;
        }

        #space {
            position: fixed;
            top: 0; left: 0; width: 100vw; height: 100vh;
            z-index: -1;
            opacity: 0.85;
        }

        /* 모바일 세로형 초최적화 컨테이너 */
        .container {
            width: 100%;
            max-width: 480px; /* 전형적인 모바일 세로 폭 규격 고정 */
            padding: 24px 16px;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 4px 0;
        }

        h1 {
            font-family: 'Orbitron', sans-serif;
            font-weight: 900;
            font-size: 1.35rem;
            color: var(--sw-yellow);
            letter-spacing: 1px;
            margin: 0;
            text-shadow: 0 0 15px var(--glow-color);
        }

        .top-controls {
            display: flex;
            gap: 8px;
        }

        /* 프리미엄 모바일 카드 폼 요소 */
        .card {
            background: var(--card-bg);
            backdrop-filter: blur(30px);
            -webkit-backdrop-filter: blur(30px);
            padding: 20px;
            border-radius: 18px;
            border: 1px solid var(--border-color);
            box-shadow: 0 4px 24px rgba(0, 0, 0, 0.2);
            transition: border-color 0.3s ease, box-shadow 0.3s ease;
        }

        .scan-controls {
            display: flex;
            flex-direction: column; /* 세로형 스택 레이아웃 구조 */
            gap: 10px;
        }

        button {
            font-family: 'Orbitron', 'Noto Sans KR', sans-serif;
            padding: 15px;
            border: 1px solid var(--border-color);
            border-radius: 12px;
            cursor: pointer;
            background: rgba(150, 150, 150, 0.08);
            color: var(--text-main);
            font-weight: 700;
            font-size: 0.9rem;
            transition: all 0.2s cubic-bezier(0.25, 1, 0.5, 1);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            user-select: none;
        }

        button:active {
            transform: scale(0.97);
            background: var(--text-main);
            color: var(--bg-black);
        }

        button.primary { background: var(--sw-yellow); color: #000; border: none; font-weight: 900; }
        button.primary:active { background: #FFFFFF; color: #000; }

        button.secondary { background: rgba(52, 199, 89, 0.12); border-color: var(--apple-green); color: var(--apple-green); }
        button.danger { background: rgba(255, 59, 48, 0.12); border-color: var(--sw-red); color: var(--sw-red); padding: 8px 14px; font-size: 0.8rem; }

        /* 세로 화면 컴팩트 로또 볼 디자인 */
        .ballBox { display: flex; flex-wrap: wrap; gap: 8px; margin: 12px 0; }
        .ball {
            width: 38px; height: 38px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-family: 'Orbitron', sans-serif; font-weight: 900; font-size: 0.95rem;
            color: #fff;
            background: #222;
            box-shadow: inset 0 -3px 6px rgba(0,0,0,0.4), 0 3px 6px rgba(0,0,0,0.2);
        }
        
        .ball.rolling {
            animation: warpSpin 0.12s linear infinite;
            background: #444 !important;
        }

        @keyframes warpSpin {
            0% { transform: translateY(-3px) scale(0.95); opacity: 0.8; }
            100% { transform: translateY(3px) scale(0.95); opacity: 0.8; }
        }

        .b1 { background: linear-gradient(135deg, #ffcc00, #ff9900); }
        .b10 { background: linear-gradient(135deg, #69C8F2, #007AFF); }
        .b20 { background: linear-gradient(135deg, #ff7272, #ff3b30); }
        .b30 { background: linear-gradient(135deg, #aaaaaa, #666666); }
        .b40 { background: linear-gradient(135deg, #b0d840, #248A3D); }

        /* 모바일 9열 가로 압축형 히트맵 */
        .heatmap-grid {
            display: grid;
            grid-template-columns: repeat(9, 1fr);
            gap: 4px;
            margin-top: 12px;
        }
        .heat-cell {
            padding: 6px 0; text-align: center; border-radius: 5px; font-size: 0.7rem;
            font-family: 'Orbitron', sans-serif; font-weight: bold; background: rgba(255,255,255,0.02);
            border: 1px solid var(--border-color); color: var(--text-sub);
        }

        .combo-analysis {
            font-size: 0.75rem; color: var(--text-sub); display: flex; gap: 8px; margin-top: 4px;
        }
        .combo-badge { background: rgba(255,255,255,0.06); padding: 1px 6px; border-radius: 4px; }

        .combo-row {
            display: flex; flex-direction: column; align-items: flex-start;
            padding: 14px 0; border-bottom: 1px solid var(--border-color);
            position: relative;
        }
        .combo-row button { position: absolute; right: 0; top: 12px; padding: 8px 14px; font-size: 0.8rem; }

        .loading {
            color: var(--sw-blue); font-family: 'Orbitron', sans-serif; font-weight: bold;
            font-size: 1rem; text-align: center; padding: 24px; text-shadow: 0 0 10px var(--sw-blue);
        }
    </style>
</head>
<body>

<canvas id="space"></canvas>

<div class="container">
    <header>
        <h1>Warp Pro</h1>
        <div class="top-controls">
            <button onclick
