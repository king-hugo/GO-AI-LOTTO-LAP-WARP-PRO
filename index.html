<!DOCTYPE html>
<html lang="ko" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GO, AI Lotto Lab Warp Pro</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Michroma&family=Orbitron:wght@500;700;900&family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --sw-yellow: #FFE81F;
            --sw-blue: #69C8F2;
            --sw-red: #FF3B30;
            --bg-black: #050507;
            --card-bg: rgba(14, 14, 20, 0.8);
            --border-color: rgba(255, 255, 255, 0.08);
            --text-main: #FFFFFF;
            --text-sub: #A1A1A6;
            --glow-color: rgba(255, 232, 31, 0.2);
            --apple-green: #34C759;
            --cold-blue: #00E5FF;
        }

        [data-theme="light"] {
            --sw-yellow: #B8860B;
            --sw-blue: #007AFF;
            --sw-red: #FF3B30;
            --bg-black: #F5F5F7;
            --card-bg: rgba(255, 255, 255, 0.85);
            --border-color: rgba(0, 0, 0, 0.08);
            --text-main: #1D1D1F;
            --text-sub: #6E6E73;
            --glow-color: rgba(0, 122, 255, 0.15);
            --apple-green: #248A3D;
            --cold-blue: #007AFF;
        }

        body {
            margin: 0;
            font-family: 'Noto Sans KR', sans-serif;
            color: var(--text-main);
            background-color: var(--bg-black);
            display: flex;
            justify-content: center;
            min-height: 100dvh;
            overflow-x: hidden;
            transition: background-color 0.4s cubic-bezier(0.25, 1, 0.5, 1);
            -webkit-tap-highlight-color: transparent;
        }

        #space {
            position: fixed;
            top: 0; left: 0; width: 100vw; height: 100vh;
            z-index: -1;
            opacity: 0.75;
        }

        .container {
            width: 100%;
            max-width: 460px; /* 모바일 완벽 세로 그립 규격 */
            padding: 20px 16px;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        h1 {
            font-family: 'Orbitron', sans-serif;
            font-weight: 900;
            font-size: 1.25rem;
            color: var(--sw-yellow);
            letter-spacing: 1px;
            margin: 0;
            text-shadow: 0 0 12px var(--glow-color);
        }

        .top-controls {
            display: flex;
            gap: 6px;
        }

        .card {
            background: var(--card-bg);
            backdrop-filter: blur(30px);
            -webkit-backdrop-filter: blur(30px);
            padding: 20px;
            border-radius: 20px;
            border: 1px solid var(--border-color);
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.3);
            transition: all 0.3s cubic-bezier(0.25, 1, 0.5, 1);
        }

        .scan-controls {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        button {
            font-family: 'Orbitron', 'Noto Sans KR', sans-serif;
            padding: 14px;
            border: 1px solid var(--border-color);
            border-radius: 12px;
            cursor: pointer;
            background: rgba(150, 150, 150, 0.08);
            color: var(--text-main);
            font-weight: 700;
            font-size: 0.85rem;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            user-select: none;
        }

        button:active {
            transform: scale(0.97);
            background: var(--text-main);
            color: var(--bg-black);
        }

        button.primary { background: var(--sw-yellow); color: #000; border: none; font-weight: 900; }
        button.secondary { background: rgba(52, 199, 89, 0.12); border-color: var(--apple-green); color: var(--apple-green); }
        button.danger { background: rgba(255, 59, 48, 0.12); border-color: var(--sw-red); color: var(--sw-red); padding: 6px 12px; font-size: 0.75rem; }

        /* 볼 컴포넌트 */
        .ballBox { display: flex; flex-wrap: wrap; gap: 6px; margin: 10px 0; }
        .ball {
            width: 36px; height: 36px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-family: 'Orbitron', sans-serif; font-weight: 900; font-size: 0.9rem;
            color: #fff;
            background: #222;
            box-shadow: inset 0 -3px 6px rgba(0,0,0,0.4), 0 3px 6px rgba(0,0,0,0.2);
        }
        
        .ball.rolling {
            animation: warpSpin 0.1s linear infinite;
            background: #444 !important;
        }

        @keyframes warpSpin {
            0% { transform: translateY(-2px) scaleY(0.9); }
            100% { transform: translateY(2px) scaleY(0.9); }
        }

        .b1 { background: linear-gradient(135deg, #ffcc00, #ff9900); }
        .b10 { background: linear-gradient(135deg, #69C8F2, #007AFF); }
        .b20 { background: linear-gradient(135deg, #ff7272, #ff3b30); }
        .b30 { background: linear-gradient(135deg, #aaaaaa, #666666); }
        .b40 { background: linear-gradient(135deg, #b0d840, #248A3D); }

        /* 3D 웜홀 레이더 캔버스 스타일 */
        .radar-wrapper {
            position: relative;
            width: 100%;
            height: 280px;
            margin: 12px 0;
            background: rgba(0,0,0,0.2);
            border-radius: 14px;
            overflow: hidden;
            border: 1px solid var(--border-color);
        }
        #radarCanvas { width: 100%; height: 100%; display: block; }

        .combo-analysis {
            font-size: 0.7rem; color: var(--text-sub); display: flex; gap: 6px; margin-top: 2px;
        }
        .combo-badge { background: rgba(255,255,255,0.06); padding: 1px 5px; border-radius: 4px; }

        .combo-row {
            display: flex; flex-direction: column; align-items: flex-start;
            padding: 1
