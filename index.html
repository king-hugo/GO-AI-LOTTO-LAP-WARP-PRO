<!DOCTYPE html>
<html lang="ko" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GO, AI Lotto Lab Warp Pro</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Michroma&family=Orbitron:wght@500;700;900&family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --sw-yellow: #FFE81F;
            --sw-blue: #69C8F2;
            --sw-red: #FF3B30;
            --bg-black: #040406;
            --card-bg: rgba(12, 12, 16, 0.85);
            --border-color: rgba(255, 255, 255, 0.07);
            --text-main: #FFFFFF;
            --text-sub: #A1A1A6;
            --glow-color: rgba(0, 229, 255, 0.15);
            --apple-green: #34C759;
            --cold-blue: #00E5FF;
        }

        [data-theme="light"] {
            --sw-yellow: #B8860B;
            --sw-blue: #007AFF;
            --sw-red: #FF3B30;
            --bg-black: #F5F5F7;
            --card-bg: rgba(255, 255, 255, 0.88);
            --border-color: rgba(0, 0, 0, 0.06);
            --text-main: #1D1D1F;
            --text-sub: #6E6E73;
            --glow-color: rgba(0, 122, 255, 0.1);
            --apple-green: #248A3D;
            --cold-blue: #007AFF;
        }

        body {
            margin: 0;
            font-family: 'Noto Sans KR', sans-serif;
            color: var(--text-main);
            background-color: var(--bg-black);
            display: flex;
            justify-content: center;
            min-height: 100dvh;
            overflow-x: hidden;
            transition: background-color 0.4s ease;
            -webkit-tap-highlight-color: transparent;
        }

        #space {
            position: fixed;
            top: 0; left: 0; width: 100vw; height: 100vh;
            z-index: -1;
            opacity: 0.7;
        }

        .container {
            width: 100%;
            max-width: 450px;
            padding: 16px;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            gap: 14px;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        h1 {
            font-family: 'Orbitron', sans-serif;
            font-weight: 900;
            font-size: 1.2rem;
            color: var(--sw-blue);
            letter-spacing: 1px;
            margin: 0;
        }

        .top-controls {
            display: flex;
            gap: 6px;
        }

        .card {
            background: var(--card-bg);
            backdrop-filter: blur(35px);
            -webkit-backdrop-filter: blur(35px);
            padding: 18px;
            border-radius: 20px;
            border: 1px solid var(--border-color);
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.4);
        }

        .scan-controls {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        button {
            font-family: 'Orbitron', 'Noto Sans KR', sans-serif;
            padding: 13px;
            border: 1px solid var(--border-color);
            border-radius: 12px;
            cursor: pointer;
            background: rgba(150, 150, 150, 0.06);
            color: var(--text-main);
            font-weight: 700;
            font-size: 0.82rem;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            user-select: none;
        }

        button:active {
            transform: scale(0.97);
            background: var(--text-main);
            color: var(--bg-black);
        }

        button.primary { background: var(--sw-yellow); color: #000; border: none; font-weight: 900; }
        button.secondary { background: rgba(52, 199, 89, 0.1); border-color: var(--apple-green); color: var(--apple-green); }
        button.danger { background: rgba(255, 59, 48, 0.1); border-color: var(--sw-red); color: var(--sw-red); padding: 5px 10px; font-size: 0.72rem; }

        .ballBox { display: flex; flex-wrap: wrap; gap: 5px; margin: 8px 0; }
        .ball {
            width: 34px; height: 34px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-family: 'Orbitron', sans-serif; font-weight: 900; font-size: 0.85rem;
            color: #fff;
            background: #222;
            box-shadow: inset 0 -2px 4px rgba(0,0,0,0.4), 0 2px 4px rgba(0,0,0,0.2);
        }
        
        .ball.rolling {
            animation: warpSpin 0.08s linear infinite;
            background: #444 !important;
        }

        @keyframes warpSpin {
            0% { transform: translateY(-2px); }
            100% { transform: translateY(2px); }
        }

        .b1 { background: linear-gradient(135deg, #ffcc00, #ff9900); }
        .b10 { background: linear-gradient(135deg, #69C8F2, #007AFF); }
        .b20 { background: linear-gradient(135deg, #ff7272, #ff3b30); }
        .b30 { background: linear-gradient(135deg, #aaaaaa, #666666); }
        .b40 { background: linear-gradient(135deg, #b0d840, #248A3D); }

        /* 격자판을 완전히 삭제한 프리미엄 웜홀 레이더 존 */
        .radar-wrapper {
            position: relative;
            width: 100%;
            height: 290px;
            margin: 4px 0 10px 0;
            background: rgba(0,0,0,0.3);
            border-radius: 16px;
            overflow: hidden;
            border: 1px solid var(--border-color);
        }
        #radarCanvas { width: 100%; height: 100%; display: block; }

        .section-subtitle {
            font-family: 'Orbitron', 'Noto Sans KR', sans-serif;
            font-size: 0.8rem;
            font-weight: 700;
            margin: 12px 0 4px 0;
        }

        .combo-analysis {
            font-size: 0.68rem; color: var(--text-sub); display: flex; gap: 5px; margin-top: 2px;
        }
        .combo-badge { background: rgba(255,255,255,0.05); padding: 1px 4px; border-radius: 3px; }

        .combo-row {
            display: flex; flex-direction: column; align-items: flex-start;
            padding: 10px 0; border-bottom: 1px solid var(--border-color);
            position: relative;
        }
        .combo-row button { position: absolute; right: 0; top: 8px; padding: 5px 10px; font-size: 0.72rem; }

        .loading {
            color: var(--sw-blue); font-family: 'Orbitron', sans-serif; font-weight: bold;
            font-size: 0.9rem; text-align: center; padding: 20px;
        }
    </style>
</head>
<body>

<canvas id="space"></canvas>

<div class="container">
    <header>
        <h1>Gargantua Quantum</h1>
        <div class="top-controls">
            <button onclick="toggleAudio()" id="bgmBtn" style="padding: 5px 9px; font-size:0.7rem;">🎵 Audio</button>
            <button onclick="toggleTheme()" style="border-radius:50%; width:30px; height:30px; padding:0;">🌓</button>
        </div>
    </header>

    <div class="card scan-controls">
        <button onclick="analyze(10)">🛸 궤도 분석 타임라인 (10회)</button>
        <button onclick="analyze(30)">🌌 항성계 연산 타임라인 (30회)</button>
        <button onclick="analyze(100)">🛰️ 심우주 퀀텀 딥 다이브 (100회)</button>
    </div>

    <div id="status"></div>
    
    <div id="analysis"></div>

    <div class="card" id="ai-section" style="display:none;">
        <h2 style="color: var(--sw-yellow); font-size:0.95rem; margin: 0 0 2px 0;">🤖 하이퍼 퀀텀 드라이브</h2>
        <p style="font-size:0.68rem; color: var(--text-sub); margin: 0 0 10px 0;">특이점 에너지 필터링 기반 최적 경로 매핑</p>
        
        <div style="display:grid; grid-template-columns: 1.2fr 1fr; gap:6px; margin-bottom: 8px;">
            <button class="primary" onclick="generateWarpSequence()">🎯 워프 시퀀스 가동</button>
            <button onclick="toggleSaved()" style="font-size:0.72rem;">💾 보관함 (<span id="saved-count">0</span>)</button>
        </div>
        
        <div id="ai-results"></div>

        <div id="saved-results" style="margin-top: 12px; display:none;">
            <h3 style="color: var(--sw-blue); font-size:0.8rem; border-top: 1px solid var(--border-color); padding-top: 10px; margin-bottom:4px;">📥 백업 차원 좌표</h3>
            <div id="saved-list"></div>
        </div>
    </div>
</div>

<script>
